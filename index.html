
<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimistegroup — Teknoloji • Inovasyon • Ayiti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a08;
    --white: #f5f2eb;
    --cream: #ede9de;
    --gold: #c9a84c;
    --gold-light: #e8c96e;
    --red: #c0392b;
    --blue: #1a3a5c;
    --text: #1c1c18;
    --muted: #6b6b60;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Newsreader', Georgia, serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.25s ease, width 0.3s, height 0.3s;
  }
  body:hover .cursor { opacity: 1; }

  /* ===== NAV ===== */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.5rem 4rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    background: rgba(10,10,8,0.85);
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    text-decoration: none;
  }
  .nav-logo span { color: var(--white); }
  .nav-links { display: flex; gap: 2.5rem; }
  .nav-links a {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,242,235,0.55);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 0.55rem 1.4rem;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }
  .nav-cta:hover { background: var(--gold); color: var(--black); }

  /* ===== HERO ===== */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse 60% 80% at 70% 50%, rgba(26,58,92,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(201,168,76,0.08) 0%, transparent 50%);
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image: 
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
  }
  .hero-left {
    display: flex; flex-direction: column; justify-content: center;
    padding: 12rem 4rem 6rem;
    position: relative; z-index: 2;
  }
  .hero-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }
  .hero-tag::before {
    content: '';
    width: 30px; height: 1px;
    background: var(--gold);
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 5vw, 5.5rem);
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.4s forwards;
  }
  h1 em {
    font-style: italic;
    font-family: 'Newsreader', serif;
    font-weight: 300;
    color: var(--gold);
  }
  .hero-desc {
    font-size: 1.15rem;
    line-height: 1.8;
    color: rgba(245,242,235,0.6);
    max-width: 420px;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.6s forwards;
  }
  .hero-btns {
    display: flex; gap: 1rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.8s forwards;
  }
  .btn-primary {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--gold);
    color: var(--black);
    padding: 1rem 2rem;
    text-decoration: none;
    font-weight: 700;
    transition: transform 0.2s, box-shadow 0.2s;
    display: inline-block;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.3); }
  .btn-outline {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(245,242,235,0.25);
    padding: 1rem 2rem;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
    display: inline-block;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  .hero-right {
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 2;
    padding: 10rem 4rem 6rem;
  }
  .hero-visual {
    width: 320px; height: 420px;
    position: relative;
  }
  .hero-card {
    position: absolute;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.2);
    backdrop-filter: blur(10px);
    padding: 1.5rem;
    border-radius: 2px;
    opacity: 0;
    animation: floatIn 1s forwards;
  }
  .hero-card:nth-child(1) { width: 240px; top: 0; left: 0; animation-delay: 0.5s; }
  .hero-card:nth-child(2) { width: 200px; bottom: 60px; right: 0; animation-delay: 0.8s; }
  .hero-card:nth-child(3) { width: 180px; bottom: 0; left: 20px; animation-delay: 1.1s; }
  .card-dot {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    margin-bottom: 0.75rem;
  }
  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }
  .card-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
  }
  .card-sub {
    font-size: 0.8rem;
    color: rgba(245,242,235,0.45);
    margin-top: 0.2rem;
  }
  .hero-flag {
    position: absolute; top: -20px; right: -20px;
    font-size: 2.5rem;
    animation: pulse 3s ease-in-out infinite;
  }

  /* ===== TICKER ===== */
  .ticker {
    background: var(--gold);
    color: var(--black);
    padding: 0.85rem 0;
    overflow: hidden;
    position: relative;
  }
  .ticker-inner {
    display: flex;
    animation: ticker 20s linear infinite;
    white-space: nowrap;
  }
  .ticker-item {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 0 3rem;
  }
  .ticker-sep { opacity: 0.5; }

  /* ===== SECTION BASE ===== */
  section { padding: 7rem 4rem; }
  .section-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .section-tag::before { content: ''; width: 24px; height: 1px; background: var(--gold); }
  h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 3.5vw, 3.5rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }
  h2 em { font-style: italic; font-family: 'Newsreader', serif; font-weight: 300; color: var(--gold); }

  /* ===== SERVICES ===== */
  .services { background: var(--black); }
  .services-header {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 4rem; align-items: end;
    margin-bottom: 5rem;
    max-width: 1100px; margin-left: auto; margin-right: auto;
  }
  .services-desc {
    font-size: 1.1rem;
    line-height: 1.8;
    color: rgba(245,242,235,0.6);
    align-self: end;
  }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.15);
    max-width: 1100px; margin: 0 auto;
  }
  .service-card {
    background: var(--black);
    padding: 3rem;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
    cursor: default;
  }
  .service-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }
  .service-card:hover { background: rgba(201,168,76,0.04); }
  .service-card:hover::before { transform: scaleX(1); }
  .service-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    margin-bottom: 2rem;
    opacity: 0.7;
  }
  .service-icon {
    font-size: 2rem;
    margin-bottom: 1.5rem;
    display: block;
  }
  .service-card h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    margin-bottom: 1rem;
    letter-spacing: -0.01em;
  }
  .service-card p {
    font-size: 0.95rem;
    line-height: 1.75;
    color: rgba(245,242,235,0.55);
  }
  .service-arrow {
    position: absolute; bottom: 2rem; right: 2rem;
    font-size: 1.2rem;
    color: var(--gold);
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .service-card:hover .service-arrow { opacity: 1; transform: translateX(0); }

  /* ===== ABOUT ===== */
  .about {
    background: var(--cream);
    color: var(--text);
  }
  .about .section-tag { color: #8B6914; }
  .about .section-tag::before { background: #8B6914; }
  .about-inner {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6rem; align-items: center;
  }
  .about h2 em { color: #8B6914; }
  .about-text p {
    font-size: 1.05rem;
    line-height: 1.85;
    color: #4a4a40;
    margin-bottom: 1.25rem;
  }
  .about-right { position: relative; }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  .stat-box {
    background: var(--black);
    color: var(--white);
    padding: 2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .stat-box::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,242,235,0.5);
  }
  .about-quote {
    margin-top: 2rem;
    padding: 1.5rem 2rem;
    border-left: 3px solid #8B6914;
    background: rgba(139,105,20,0.06);
    font-style: italic;
    font-size: 1.05rem;
    line-height: 1.7;
    color: #4a4a40;
  }

  /* ===== TEAM ===== */
  .team {
    background: #0d0d0b;
    text-align: center;
  }
  .team-header { max-width: 600px; margin: 0 auto 4rem; }
  .team-header .section-tag { justify-content: center; }
  .team-header .section-tag::before { display: none; }
  .team-grid {
    display: flex; justify-content: center; gap: 2rem;
    flex-wrap: wrap;
    max-width: 900px; margin: 0 auto;
  }
  .team-card {
    width: 220px;
    text-align: center;
    padding: 2.5rem 1.5rem;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(201,168,76,0.12);
    transition: border-color 0.3s, transform 0.3s;
  }
  .team-card:hover { border-color: var(--gold); transform: translateY(-4px); }
  .team-avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue) 0%, var(--gold) 100%);
    margin: 0 auto 1.25rem;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--white);
    border: 2px solid rgba(201,168,76,0.3);
  }
  .team-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.4rem;
  }
  .team-role {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* ===== CONTACT ===== */
  .contact {
    background: var(--black);
    border-top: 1px solid rgba(201,168,76,0.12);
  }
  .contact-inner {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1.2fr;
    gap: 6rem;
  }
  .contact-info h2 { margin-bottom: 1rem; }
  .contact-info > p {
    font-size: 1.05rem;
    line-height: 1.8;
    color: rgba(245,242,235,0.55);
    margin-bottom: 3rem;
  }
  .contact-items { display: flex; flex-direction: column; gap: 1.5rem; }
  .contact-item { display: flex; gap: 1.25rem; align-items: flex-start; }
  .contact-item-icon {
    width: 42px; height: 42px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .contact-item-text { }
  .contact-item-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }
  .contact-item-value {
    font-size: 0.95rem;
    color: rgba(245,242,235,0.75);
  }
  .contact-item-value a {
    color: inherit; text-decoration: none;
    transition: color 0.2s;
  }
  .contact-item-value a:hover { color: var(--gold); }

  /* Form */
  .contact-form { display: flex; flex-direction: column; gap: 1.25rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .form-group label {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,242,235,0.45);
  }
  .form-group input,
  .form-group textarea {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.18);
    padding: 0.9rem 1.1rem;
    color: var(--white);
    font-family: 'Newsreader', serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 0;
    resize: vertical;
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: rgba(245,242,235,0.2); }
  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--gold); }
  .form-group textarea { min-height: 140px; }
  .form-submit {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--gold);
    color: var(--black);
    border: none;
    padding: 1.1rem 2.5rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    align-self: flex-start;
  }
  .form-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.3); }
  .form-success {
    display: none;
    text-align: center;
    padding: 3rem;
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
  }
  .form-success .check { font-size: 2.5rem; margin-bottom: 1rem; }

  /* ===== FOOTER ===== */
  footer {
    background: #070705;
    padding: 2.5rem 4rem;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(201,168,76,0.1);
  }
  .footer-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .footer-copy {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    color: rgba(245,242,235,0.3);
  }
  .footer-social a {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(245,242,235,0.4);
    text-decoration: none;
    transition: color 0.2s;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .footer-social a:hover { color: var(--gold); }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes ticker {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .hero-visual { animation: float 6s ease-in-out infinite; }

  /* Reveal on scroll */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: none; }

  /* Mobile */
  @media (max-width: 768px) {
    nav { padding: 1.25rem 1.5rem; }
    .nav-links { display: none; }
    .hero { grid-template-columns: 1fr; }
    .hero-right { display: none; }
    .hero-left { padding: 9rem 1.5rem 4rem; }
    section { padding: 5rem 1.5rem; }
    .services-header { grid-template-columns: 1fr; gap: 1.5rem; }
    .services-grid { grid-template-columns: 1fr; }
    .about-inner { grid-template-columns: 1fr; gap: 3rem; }
    .contact-inner { grid-template-columns: 1fr; gap: 3rem; }
    .form-row { grid-template-columns: 1fr; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">OG <span>Optimiste</span></a>
  <div class="nav-links">
    <a href="#services">Sèvis</a>
    <a href="#about">Nou Ye</a>
    <a href="#team">Ekip</a>
    <a href="#contact">Kontakte</a>
  </div>
  <a href="#contact" class="nav-cta">Pale Avèk Nou</a>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>

  <div class="hero-left">
    <div class="hero-tag">Teknoloji • Inovasyon • Ayiti 🇭🇹</div>
    <h1>Nou Bati<br><em>Lavni</em><br>Dijital Ou a</h1>
    <p class="hero-desc">Optimistegroup kreye aplikasyon mobil ak sit entènèt pwofesyonèl ki ede biznis ou grandi nan laj dijital la.</p>
    <div class="hero-btns">
      <a href="#services" class="btn-primary">Wè Sèvis Nou</a>
